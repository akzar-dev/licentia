name: Deploy to GitHub Pages

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: Build Docusaurus
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
        working-directory: website

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: website/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        id: typecheck
        run: npm run typecheck

      - name: Validate image-optimization cache is not corrupt
        id: cache_check
        run: |
          node -e "JSON.parse(require('fs').readFileSync('.image-opt-cache.json','utf8'))" \
            && echo "image cache JSON is valid"

      - name: Check doc image dimensions are in sync
        id: dims_check
        run: |
          npm run sync-doc-images
          if ! git diff --quiet -- docs src/pages; then
            echo "::error::Doc image dimensions are out of sync. Run 'npm run sync-doc-images' locally and commit the result."
            git --no-pager diff --stat -- docs src/pages
            exit 1
          fi
          echo "doc image dimensions are in sync"

      - name: Build website
        id: build
        run: npm run build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: website/build

      - name: Build summary
        if: always()
        run: |
          icon() { case "$1" in success) echo "✅";; failure) echo "❌";; skipped) echo "⏭️";; cancelled) echo "🚫";; *) echo "➖";; esac; }
          {
            echo "## 🏗️ Build for deploy — \`${{ github.ref_name }}\`"
            echo ""
            echo "Commit \`${GITHUB_SHA::7}\` · Node $(node -v) · Docusaurus $(node -p "require('@docusaurus/core/package.json').version" 2>/dev/null || echo n/a)"
            echo ""
            echo "| Check | Result |"
            echo "| --- | :---: |"
            echo "| Typecheck | $(icon '${{ steps.typecheck.outcome }}') |"
            echo "| Image cache integrity | $(icon '${{ steps.cache_check.outcome }}') |"
            echo "| Doc image dimensions in sync | $(icon '${{ steps.dims_check.outcome }}') |"
            echo "| Production build | $(icon '${{ steps.build.outcome }}') |"
            if [ "${{ steps.build.outcome }}" = "success" ]; then
              pages=$(find build -name '*.html' | wc -l | tr -d ' ')
              size=$(du -sh build | cut -f1 | tr -d ' ')
              echo ""
              echo "**Built site:** ${pages} HTML pages · ${size} total"
            fi
          } >> "$GITHUB_STEP_SUMMARY"

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5

      - name: Deployment summary
        if: always()
        run: |
          {
            echo "## 🚀 Deploy to GitHub Pages"
            echo ""
            if [ "${{ steps.deployment.outcome }}" = "success" ]; then
              echo "✅ Deployed commit \`${GITHUB_SHA::7}\` to GitHub Pages."
              echo ""
              echo "**Live URL:** ${{ steps.deployment.outputs.page_url }}"
            else
              echo "❌ Deployment did not complete (build failed or was cancelled)."
            fi
          } >> "$GITHUB_STEP_SUMMARY"
